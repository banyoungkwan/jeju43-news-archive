app = 'jeju43-news'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH    = '/data/db/news.db'
  PORT       = '8080'

[[mounts]]
  source      = 'jeju43_news_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = '30s'
    timeout      = '15s'
    grace_period = '60s'
    method       = 'GET'
    path         = '/api/stats'

[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1
