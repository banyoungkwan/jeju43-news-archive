<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}제주4.3 뉴스 아카이브{% endblock %}</title>
  <meta name="google-site-verification" content="_bciDAnNlg09X7QSc7qfMAt47by2QicWj_OQG0XSmw4" />
  <meta name="description" content="{% block meta_description %}국내외 언론의 제주4·3사건 관련 보도를 수집·보존하는 디지털 아카이브. A digital archive collecting and preserving domestic and international media coverage on the Jeju April 3rd Incident.{% endblock %}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{% block canonical %}{{ request.url_root.rstrip('/') }}{{ request.path }}{% endblock %}">

  <!-- Open Graph -->
  <meta property="og:type"        content="{% block og_type %}website{% endblock %}">
  <meta property="og:site_name"   content="제주4·3 뉴스 아카이브">
  <meta property="og:title"       content="{% block og_title %}제주4·3 뉴스 아카이브 — 국내외 언론 보도 아카이브{% endblock %}">
  <meta property="og:description" content="{% block og_description %}국내외 언론의 제주4·3 관련 보도를 수집·보존하는 디지털 아카이브{% endblock %}">
  <meta property="og:url"         content="{{ request.url_root.rstrip('/') }}{{ request.path }}">
  <meta property="og:locale"      content="ko_KR">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="{% block tw_title %}제주4·3 뉴스 아카이브{% endblock %}">
  <meta name="twitter:description" content="{% block tw_description %}국내외 언론의 제주4·3 관련 보도 디지털 아카이브{% endblock %}">

  <!-- JSON-LD 구조화 데이터 -->
  {% block json_ld %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "DataCatalog",
    "name": "제주4·3 뉴스 아카이브",
    "alternateName": "Jeju 4·3 News Archive",
    "url": "https://news.jeju43.info",
    "description": "국내외 언론의 제주4·3사건 관련 보도를 수집·보존하는 디지털 아카이브",
    "inLanguage": ["ko", "en"],
    "creator": {
      "@type": "Person",
      "name": "Youngkwan Ban",
      "email": "youngkwan.ban@gmail.com"
    },
    "publisher": {
      "@type": "Organization",
      "name": "제주4·3 지식 아카이브",
      "url": "https://jeju43.info"
    },
    "about": {
      "@type": "Thing",
      "name": "제주4·3사건",
      "alternateName": "Jeju April 3rd Incident",
      "description": "1947–1954년 제주도에서 발생한 무장봉기와 민간인 학살 사건"
    }
  }
  </script>
  {% endblock %}

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">

  <!-- OG Image -->
  <meta property="og:image" content="{{ request.url_root.rstrip('/') }}{{ url_for('static', filename='og-image.png') }}">
  <meta name="twitter:image" content="{{ request.url_root.rstrip('/') }}{{ url_for('static', filename='og-image.png') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<!-- 상단 배너 -->
<div class="top-banner">
  <span>제주4·3 관련 국내외 언론 보도를 매일 자동으로 수집·아카이빙합니다</span>
</div>

<!-- 헤더 -->
<header class="site-header">
  <div class="container header-inner">
    <a href="{{ url_for('index') }}" class="site-logo">
      <img class="logo-mark" src="{{ url_for('static', filename='logo-navbar.svg') }}" alt="제주 4·3" width="34" height="34">
      <span class="logo-ko">제주4·3</span>
      <span class="logo-divider">|</span>
      <span class="logo-en">뉴스 아카이브</span>
    </a>

    <nav class="main-nav" id="mainNav">
      <a href="{{ url_for('articles') }}" class="nav-link {% if request.endpoint == 'articles' %}active{% endif %}">기사</a>
      <a href="{{ url_for('timeline') }}" class="nav-link {% if request.endpoint == 'timeline' %}active{% endif %}">타임라인</a>
      <a href="{{ url_for('figures') }}" class="nav-link {% if request.endpoint == 'figures' %}active{% endif %}">관련 인물</a>
      <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">소개</a>
    </nav>

    <form class="header-search" action="{{ url_for('search') }}" method="get" aria-label="페이지 검색">
      <input type="search" name="q" placeholder="기사 검색…"
             value="{{ request.args.get('q', '') }}" autocomplete="off">
      <button type="submit" aria-label="검색">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </form>

    <!-- 모바일 검색 버튼 -->
    <button class="mobile-search-btn" onclick="document.querySelector('.mobile-search-overlay').classList.toggle('open')" aria-label="검색">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>

    <!-- 모바일 햄버거 버튼 -->
    <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- 모바일 검색 오버레이 -->
<div class="mobile-search-overlay">
  <form action="{{ url_for('search') }}" method="get" style="display:flex;gap:8px;flex:1">
    <input type="text" name="q" placeholder="기사 검색..." autofocus>
    <button type="submit" style="padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-weight:500">검색</button>
  </form>
  <button class="close-search" onclick="this.parentElement.classList.remove('open')" aria-label="닫기">✕</button>
</div>

<!-- 네비게이션 배경 -->
<div class="nav-backdrop" id="navBackdrop" onclick="closeNav()"></div>

<script>
  const toggle = document.getElementById('navToggle');
  const nav    = document.getElementById('mainNav');

  function closeNav() {
    nav.classList.remove('open');
    toggle.classList.remove('open');
    toggle.setAttribute('aria-label', '메뉴 열기');
    document.body.style.overflow = '';
    document.getElementById('navBackdrop').classList.remove('open');
  }

  toggle.addEventListener('click', () => {
    const open = nav.classList.toggle('open');
    toggle.classList.toggle('open', open);
    toggle.setAttribute('aria-label', open ? '메뉴 닫기' : '메뉴 열기');
    document.body.style.overflow = open ? 'hidden' : '';
    document.getElementById('navBackdrop').classList.toggle('open', open);
  });
  // 링크 클릭 시 메뉴 닫기
  nav.querySelectorAll('.nav-link').forEach(a =>
    a.addEventListener('click', closeNav)
  );
</script>

<!-- 본문 -->
<main class="site-main" id="main-content">
  {% block content %}{% endblock %}
</main>

<!-- 푸터 -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <p class="footer-title">제주4·3 뉴스 아카이브</p>
      <p class="footer-desc">국내외 언론의 제주4·3 관련 보도를 수집·보존합니다.</p>
    </div>
    <div class="footer-right">
      <p>© 2025 제주4·3 뉴스 아카이브</p>
    </div>
  </div>
</footer>

{% block scripts %}{% endblock %}

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="맨 위로">↑</button>
<script>
window.addEventListener('scroll',()=>{
    document.getElementById('backToTop').classList.toggle('visible',window.scrollY>500);
});
</script>
</body>
</html>
